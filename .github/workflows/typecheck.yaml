name: Type Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pyrightconfig.json"
      - "pyproject.toml"
      - ".github/workflows/typecheck.yaml"
  pull_request:
    paths:
      - "src/**"
      - "pyrightconfig.json"
      - "pyproject.toml"
      - ".github/workflows/typecheck.yaml"

permissions:
  contents: read

jobs:
  basedpyright:
    name: BasedPyright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run BasedPyright
        run: basedpyright src/neopool_modbus
